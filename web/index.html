<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teva TG Converter</title>
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="/eel.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>Teva TG Converter</h1>
        <p>Telegram account data converter</p>
      </header>

      <section class="tabs">
        <button class="tab active" data-tab="toTdata">telethon → tdata</button>
        <button class="tab" data-tab="toTelethon">tdata → telethon</button>
      </section>

      <section class="card">
        <div class="panel active" id="toTdata">
          <label>Telethon session file (.session)</label>
          <input id="sessionPath" type="text" placeholder="C:/tg/my.session" />

          <label>Output folder for tdata</label>
          <input id="outputDir" type="text" placeholder="C:/tg/output_tdata" />

          <button class="primary" id="runToTdata">Convert to tdata</button>
          <p class="status" id="statusToTdata">Ready</p>
        </div>

        <div class="panel" id="toTelethon">
          <label>tdata directory</label>
          <input id="tdataDir" type="text" placeholder="C:/tg/tdata" />

          <label>Output telethon session path</label>
          <input id="outputSessionPath" type="text" placeholder="C:/tg/new_account.session" />

          <button class="primary" id="runToTelethon">Convert to telethon</button>
          <p class="status" id="statusToTelethon">Ready</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
